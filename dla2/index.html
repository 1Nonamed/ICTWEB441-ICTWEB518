<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DLA 2 - Javascript | Part 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="main.js" defer></script>
  </head>
  <body>
    <header class="max-w-lg mx-auto py-4">
      <h1 class="text-2xl font-bold">DLA 2 - Javascript | Part 1</h1>
    </header>
    <main class="max-w-lg mx-auto">
      <section class="flex flex-col gap-8">
        <article>
          <h2 class="text-lg font-semibold">Student List</h2>
          <ul id="studentList"></ul>
        </article>
        <article>
          <h2 class="text-lg font-semibold relative">Button Alert</h2>
          <div class="relative">
            <div
              id="alert"
              class="hidden gap-2 bg-sky-100 border border-sky-400 text-sky-700 px-4 py-2 rounded absolute top-full mt-2"
            >
              <button
                class="text-sky-500 hover:text-sky-700 text-2xl font-bold leading-none p-2 cursor-pointer"
              >
                &times;
              </button>
              <span>
                Lorem ipsum dolor sit amet consectetur adipisicing elit. Vitae,
                nesciunt?
              </span>
            </div>
            <button
              id="alertButton"
              class="border rounded-lg px-4 py-2 bg-blue-950 text-white cursor-pointer"
            >
              Submit
            </button>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
