<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dynamic Navbar using XML & Bootstrap</title>
    <!-- Bootstrap 5 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <script src="../main.js" defer></script>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">My Website</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav" id="menuItems">
            <!-- XML data will be inserted here -->
          </ul>
        </div>
      </div>
    </nav>
    <script>
      fetch("menu.xml")
        .then((response) => response.text())
        .then((str) => new window.DOMParser().parseFromString(str, "text/xml"))
        .then((data) => {
          const items = data.getElementsByTagName("item");
          let output = "";

          for (let i = 0; i < items.length; i++) {
            const name = items[i].getElementsByTagName("name")[0].textContent;
            const url = items[i].getElementsByTagName("url")[0].textContent;

            output += `<li class="nav-item">
                          <a class="nav-link" href="${url}">${name}</a>
                       </li>`;
          }

          document.getElementById("menuItems").innerHTML = output;
        })
        .catch((error) => console.error("Error loading XML:", error));
    </script>
  </body>
</html>
